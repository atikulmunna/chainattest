name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  contracts:
    name: Contracts Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        run: npm ci

      - name: Build contracts
        run: npm run build

      - name: Test contracts
        run: npm test

  python-tooling:
    name: Python CLI and Coordinator Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: |
            contracts/package-lock.json
            circuits/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Install JavaScript dependencies for crypto bridge
        run: |
          npm ci --prefix contracts
          npm ci --prefix circuits

      - name: Build contracts for bridge-backed tests
        run: npm run build --prefix contracts

      - name: Install CLI package
        run: python -m pip install -e ./cli

      - name: Compile Python sources
        run: python -m compileall cli coordinator committee tests

      - name: Check CLI entrypoint
        run: python cli/chain_attest/main.py --help

      - name: Check operator entrypoint
        run: python coordinator/chainattest_coordinator/ops.py --help

      - name: Run Python orchestration tests
        run: python -m unittest discover -s tests
